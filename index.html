<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="iss">
  <title>iss tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #030508;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.06);
      --text: #e8edf5;
      --muted: rgba(232,237,245,0.35);
      --accent: #4fc3f7;
      --green: #69f0ae;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-y: auto;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 65%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(env(safe-area-inset-top), 20px) 24px max(env(safe-area-inset-bottom), 20px);
      position: relative;
      gap: 16px;
    }
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }
    .title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--green);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: livepulse 1s ease-in-out infinite;
    }
    @keyframes livepulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .map-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }
    .map-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
      z-index: 2;
      pointer-events: none;
    }
    #mapCanvas {
      width: 100%;
      height: 220px;
      display: block;
    }
    .coords-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .coord-item { text-align: center; }
    .coord-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .coord-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    .region-center {
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .stat-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }
    .stat-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .stat-value.highlight { color: var(--green); }
    .stat-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Share Tech Mono', monospace;
    }
    .astronaut-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
    }
    .astronaut-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .astronaut-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .astronaut-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: var(--accent);
    }
    .astronaut-list { display: flex; flex-direction: column; gap: 6px; }
    .astronaut-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .astronaut-item::before { content: '›'; color: var(--accent); font-size: 14px; }
    .footer {
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em;
      padding: 0 4px 8px;
    }
    .loading { animation: loadpulse 1.2s ease-in-out infinite; }
    @keyframes loadpulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header fade-in">
    <div class="title">ISS · Tracker</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>

  <div class="map-card fade-in">
    <canvas id="mapCanvas"></canvas>
  </div>

  <div class="coords-row fade-in">
    <div class="coord-item">
      <div class="coord-label">Breitengrad</div>
      <div class="coord-value loading" id="lat">···</div>
    </div>
    <div class="region-center loading" id="region">···</div>
    <div class="coord-item">
      <div class="coord-label">Längengrad</div>
      <div class="coord-value loading" id="lng">···</div>
    </div>
  </div>

  <div class="stats-grid fade-in">
    <div class="stat-tile">
      <div class="stat-label">Geschwindigkeit</div>
      <div class="stat-value highlight">27.600</div>
      <div class="stat-sub">km/h</div>
    </div>
    <div class="stat-tile">
      <div class="stat-label">Höhe</div>
      <div class="stat-value">408</div>
      <div class="stat-sub">km über Erde</div>
    </div>
    <div class="stat-tile">
      <div class="stat-label">Umlaufzeit</div>
      <div class="stat-value">92</div>
      <div class="stat-sub">min pro Orbit</div>
    </div>
    <div class="stat-tile">
      <div class="stat-label">Aktualisiert</div>
      <div class="stat-value" id="lastUpdate" style="font-size:14px;">···</div>
      <div class="stat-sub">Uhr</div>
    </div>
  </div>

  <div class="astronaut-tile fade-in">
    <div class="astronaut-header">
      <div class="astronaut-label">Besatzung an Bord</div>
      <div class="astronaut-count" id="astronautCount">···</div>
    </div>
    <div class="astronaut-list" id="astronautList">
      <div class="astronaut-item loading">Wird geladen…</div>
    </div>
  </div>

  <div class="footer fade-in">DATEN: WHERETHEISS.AT · ISS POSITION API</div>
</div>

<script>
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let issLat = 0, issLng = 0;
let glowPhase = 0;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = 220 * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '220px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

function latLngToXY(lat, lng, w, h) {
  const x = (lng + 180) / 360 * w;
  const y = (90 - lat) / 180 * h;
  return [x, y];
}

const continents = [
  [[70,-140],[70,-60],[25,-60],[15,-85],[30,-110],[60,-140]],
  [[15,-80],[10,-60],[-55,-65],[-55,-70],[-20,-80],[0,-80]],
  [[70,30],[70,10],[35,10],[35,30],[50,40],[60,30]],
  [[35,10],[35,50],[-35,50],[-35,10],[0,10]],
  [[70,30],[70,140],[10,140],[10,100],[30,60],[50,40],[60,30]],
  [[-15,115],[-15,150],[-40,150],[-40,115]],
  [[85,-70],[85,-20],[60,-20],[60,-50],[75,-70]],
];

function draw() {
  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#030c18';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(79,195,247,0.06)';
  ctx.lineWidth = 0.5;
  for (let lat = -90; lat <= 90; lat += 30) {
    const [, y] = latLngToXY(lat, 0, W, H);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let lng = -180; lng <= 180; lng += 30) {
    const [x] = latLngToXY(0, lng, W, H);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(79,195,247,0.12)';
  ctx.lineWidth = 1;
  const [, eqY] = latLngToXY(0, 0, W, H);
  ctx.beginPath(); ctx.moveTo(0, eqY); ctx.lineTo(W, eqY); ctx.stroke();

  continents.forEach(poly => {
    ctx.beginPath();
    poly.forEach(([lat, lng], i) => {
      const [x, y] = latLngToXY(lat, lng, W, H);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.fillStyle = 'rgba(79,195,247,0.12)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(79,195,247,0.25)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  const [issX, issY] = latLngToXY(issLat, issLng, W, H);
  glowPhase += 0.05;
  const pulse = 0.5 + 0.5 * Math.sin(glowPhase);
  const ringR = 12 + pulse * 6;
  ctx.beginPath();
  ctx.arc(issX, issY, ringR, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(79,195,247,${0.15 + pulse * 0.15})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  const grd = ctx.createRadialGradient(issX, issY, 0, issX, issY, 16);
  grd.addColorStop(0, `rgba(79,195,247,${0.4 + pulse * 0.3})`);
  grd.addColorStop(1, 'rgba(79,195,247,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(issX, issY, 16, 0, Math.PI * 2);
  ctx.fill();

  ctx.font = `${14 + pulse * 2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🛸', issX, issY);
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}
animate();

async function fetchISS() {
  try {
    const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
    const data = await res.json();
    issLat = parseFloat(data.latitude);
    issLng = parseFloat(data.longitude);

    document.getElementById('lat').textContent = issLat.toFixed(2) + '°';
    document.getElementById('lng').textContent = issLng.toFixed(2) + '°';
    document.getElementById('lat').className = 'coord-value';
    document.getElementById('lng').className = 'coord-value';

    let region = '';
    if (issLat > 60) region = '🧊 Arktis';
    else if (issLat < -60) region = '🧊 Antarktis';
    else if (issLng > -30 && issLng < 60) region = issLat > 0 ? '🌍 Europa' : '🌍 Afrika';
    else if (issLng >= 60 && issLng < 150) region = issLat > 0 ? '🌏 Asien' : '🌏 Australien';
    else region = issLat > 0 ? '🌎 Nordamerika' : '🌎 Südamerika';
    document.getElementById('region').textContent = region;
    document.getElementById('region').className = 'region-center';

    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch (err) {
    document.getElementById('region').textContent = 'Fehler';
  }
}

async function fetchAstronauts() {
  try {
    const res = await fetch('https://corquaid.github.io/international-space-station-APIs/JSON/people-in-space.json');
    const data = await res.json();
    const crew = data.people.filter(p => p.craft === 'ISS');
    document.getElementById('astronautCount').textContent = crew.length + ' Personen';
    const list = document.getElementById('astronautList');
    list.innerHTML = '';
    crew.forEach(p => {
      const div = document.createElement('div');
      div.className = 'astronaut-item';
      div.textContent = p.name;
      list.appendChild(div);
    });
  } catch (err) {
    document.getElementById('astronautCount').textContent = '–';
  }
}

fetchISS();
fetchAstronauts();
setInterval(fetchISS, 1000);
setInterval(fetchAstronauts, 5 * 60 * 1000);
</script>
</body>
</html>
